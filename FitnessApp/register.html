<!DOCTYPE html>
<html lang="bg">
<head>

</head>
<body class="bg-light">
  <div class="container mt-5">
    <h2>Register</h2>
    <input id="reg-username" class="form-control mb-2" placeholder="Username">

  </div>

  <script src="js/auth.js"></script>

</html>
